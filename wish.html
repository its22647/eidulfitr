<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak!</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cinzel:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="decoration-layer">
        <span class="kalyan k1">🌸</span><span class="kalyan k2">🌺</span>
        <span class="kalyan k3">🌼</span><span class="kalyan k4">🌷</span>
        <span class="kalyan k5">🌙</span><span class="kalyan k6">🏮</span>
    </div>
    
    <div class="wish-wrapper">
        <div class="wish-content">
            <h1 class="eid-title-anim rainbow-text">Eid Mubarak</h1>
            <h2 id="targetName" class="user-name-anim neon-blue">Guest</h2>
            
            <div class="divider-gold"></div>
            
            <p class="pro-quote">
                May the divine blessings of Allah bring you hope, faith, and joy on this auspicious day. May your heart be light and your life be bright with the beauty of this celebration.
            </p>

            <div class="signature-section">
                <span class="tag">HEARTFELT REGARDS FROM</span>
                <h3 class="sender-name-anim rainbow-text-alt">Muhammad Aamir</h3>
                <button onclick="window.location.href='index.html'" class="create-btn">Create New</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
