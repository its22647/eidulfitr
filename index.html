<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Special | Welcome</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="main-wrapper">
        <div class="glass-card animate-entry">
            <div class="badge">EID-UL-FITR 2026</div>
            <h1 class="gold-title">Special Greeting</h1>
            <p class="desc">Enter your name to unlock the magic.</p>
            
            <div class="input-section">
                <input type="text" id="nameInput" placeholder="Enter Your Name..." maxlength="15" autocomplete="off">
                <button id="startBtn" class="primary-btn">Open Greeting ✨</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
