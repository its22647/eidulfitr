<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Special 2026</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
    <div class="decoration-layer">
        <div class="flower f1">🌸</div><div class="flower f2">🌺</div>
        <div class="flower f3">🌼</div><div class="flower f4">🌷</div>
    </div>

    <div class="main-wrapper">
        <div class="glass-card entry-card">
            <div class="premium-badge">EXCLUSIVE ACCESS</div>
            <h1 class="hero-title">Premium <br><span class="rainbow-text">Eid Greeting</span></h1>
            <p class="sub-text">A masterpiece celebration crafted just for you.</p>
            
            <div class="input-group">
                <input type="text" id="nameInput" placeholder="Write Your Name..." maxlength="15">
                <button id="startBtn" class="glow-btn">Open Greeting ✨</button>
            </div>
            <p class="footer-note">Experience the Magic of Eid 2026</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
